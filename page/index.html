<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Ashish | Freelancer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: #ffffff;
            color: #111;
        }

        /* Navbar */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 25px 60px;
        }

        header h2 {
            font-weight: 800;
        }

        nav a {
            margin-left: 25px;
            text-decoration: none;
            color: #111;
            font-size: 14px;
        }

        .btn {
            background: #111;
            color: #fff;
            padding: 10px 18px;
            border-radius: 6px;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 80px 20px;
        }

        .intro {
            font-size: 14px;
            margin-bottom: 20px;
            color: #555;
        }

        .title-main {
            font-size: 90px;
            font-weight: 800;
            line-height: 1;
        }

        .title-outline {
            font-size: 90px;
            font-weight: 800;
            line-height: 1;
            color: transparent;
            -webkit-text-stroke: 1.5px #111;
        }

        .location {
            margin-top: 20px;
            font-size: 16px;
            color: #666;
        }

        .cta {
            margin-top: 40px;
        }

        .cta button {
            padding: 12px 20px;
            margin: 10px;
            border-radius: 8px;
            border: 1px solid #111;
            background: transparent;
            cursor: pointer;
            font-size: 14px;
        }

        .cta .primary {
            background: #111;
            color: #fff;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .title-main,
            .title-outline {
                font-size: 55px;
            }

            header {
                padding: 20px;
            }
        }
    </style>
</head>
<body>

<header>
    <h2>Ashish.</h2>
    <nav>
        <a href="about.html">About</a>
        <a href="contact.html" class="btn">Contact</a>
    </nav>
</header>

<section class="hero">
    <p class="intro">👋 My name is Ashish and I am a freelancer</p>

    <h1 class="title-main">Web Developer</h1>
    <h1 class="title-outline">& Designer</h1>

    

    <p class="location">Based in Bengaluru, Karnataka</p>

    <div class="cta">
        <button class="primary">You need a developer</button>
        <button>You need a designer</button>
    </div>
</section>


</body>
</html>
