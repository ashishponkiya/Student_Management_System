<html>
<head>
<style>
    .contact {
    text-align: center;
    padding: 100px 20px;
    background: #f7f7f7;
}

.contact h2 {
    font-size: 48px;
    font-weight: 800;
    margin-bottom: 30px;
}

.contact-img {
    width: 260px;
    height: auto;
    display: block;
    margin: 0 auto 30px;
    border-radius: 20px;
    object-fit: cover;
}

.contact-text {
    font-size: 16px;
    color: #555;
    margin-bottom: 30px;
}

.contact-btn {
    display: inline-block;
    background: #111;
    color: #fff;
    padding: 14px 26px;
    border-radius: 8px;
    text-decoration: none;
    font-size: 14px;
}

</style>
</head>    
<body>
<section class="contact">
    <h2>Contact Me</h2>

    <img src="contact.jpg" alt="Contact Ashish" class="contact-img">

    <p class="contact-text">
        Interested in working together?  
        Let’s create something amazing.
    </p>

    <a href="mailto:ashish@email.com" class="contact-btn">Get in Touch</a>
</section>
</html>
</html>
